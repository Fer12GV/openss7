services:
  builder:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Fuentes OpenSS7 (read-write: autogen.sh modifica configure.ac)
      - .:/opt/openss7
      # Kernel: SOLO el kernel actual del host (evita OOM por escanear 70+ kernels)
      - /lib/modules/${KERNEL_VERSION}:/lib/modules/${KERNEL_VERSION}:ro
      - /usr/src:/usr/src:ro
      - /boot:/boot:ro
      # Directorio de build (persistente para cache, separado de fuentes)
      - openss7-build:/build
      # Directorio de salida para artefactos
      - ./build-output:/output
    environment:
      - BUILD_JOBS=${BUILD_JOBS:-}
      - KERNEL_VERSION=${KERNEL_VERSION}
    # Limite de memoria para evitar OOM en config.status
    mem_limit: 4g
    # Por defecto ejecuta build
    command: ["build"]

  # Entorno de runtime persistente — muestra el stack desplegado
  runtime:
    image: openss7-builder:latest
    container_name: openss7-runtime
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command: ["echo 'OpenSS7 runtime ready' && sleep infinity"]
    volumes:
      - .:/opt/openss7:ro
      - /lib/modules/${KERNEL_VERSION}:/lib/modules/${KERNEL_VERSION}:ro
      - ./build-output:/output:ro
    environment:
      - KERNEL_VERSION=${KERNEL_VERSION}
    labels:
      - "project=openss7"
      - "role=runtime"
      - "version=1.1.1"

  # Panel web de monitoring — el cliente ve el estado del sistema en el navegador
  portainer:
    image: portainer/portainer-ce:latest
    container_name: openss7-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    labels:
      - "project=openss7"
      - "role=monitoring"

volumes:
  openss7-build:
    name: openss7-build-cache
  portainer_data:
    name: openss7-portainer-data
